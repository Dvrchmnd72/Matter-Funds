{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Power / Estate Dealing – Matter Funds{% endblock %}
{% block content %}
<h1>New Power / Estate Dealing</h1>
<p><strong>{{ entry }}</strong></p>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form|crispy }}
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'trust:power_money_detail' entry.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
