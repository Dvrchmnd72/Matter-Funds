{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}New Payment – Matter Funds{% endblock %}
{% block content %}
<h1>New Payment</h1>
<p class="text-muted">Ledger: {{ ledger }} | Balance: ${{ ledger.balance }}</p>

<form method="post">
  {% csrf_token %}
  {{ form|crispy }}
  <button type="submit" class="btn btn-primary">Save Payment</button>
</form>

<script>
(function () {
  function closestField(el) {
    if (!el) return null;
    return el.closest('.mb-3, .form-group, .control-group, p, div');
  }

  function updatePaymentReferenceFields() {
    var method = document.getElementById('id_payment_method');
    var eftReference = document.getElementById('id_payment_reference_override');
    var chequeNumber = document.getElementById('id_cheque_number');

    var eftWrapper = closestField(eftReference);
    var chequeWrapper = closestField(chequeNumber);

    if (!method) return;

    if (method.value === 'cheque') {
      if (eftWrapper) eftWrapper.style.display = 'none';
      if (chequeWrapper) chequeWrapper.style.display = '';
    } else if (method.value === 'eft') {
      if (eftWrapper) eftWrapper.style.display = '';
      if (chequeWrapper) chequeWrapper.style.display = 'none';
    } else {
      if (eftWrapper) eftWrapper.style.display = '';
      if (chequeWrapper) chequeWrapper.style.display = '';
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    var method = document.getElementById('id_payment_method');
    updatePaymentReferenceFields();
    if (method) {
      method.addEventListener('change', updatePaymentReferenceFields);
    }
  });
})();
</script>
{% endblock %}
