{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}New Receipt – Matter Funds{% endblock %}
{% block content %}
<h1>New Receipt</h1>
<p class="text-muted">Ledger: <strong>{{ ledger }}</strong> | Balance: ${{ ledger.balance }}</p>
<div class="row"><div class="col-md-8">
  <form method="post">{% csrf_token %}{{ form|crispy }}<button type="submit" class="btn btn-primary">Save Receipt</button></form>
</div></div>
{% endblock %}
