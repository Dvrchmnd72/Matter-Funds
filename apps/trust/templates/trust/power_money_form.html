{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Power / Estate – Matter Funds{% endblock %}
{% block content %}
<h1>{% if object %}Edit{% else %}New{% endif %} Register Entry</h1>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form|crispy }}
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'trust:power_money_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
